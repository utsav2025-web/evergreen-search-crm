[build]
  base    = "frontend"
  publish = "dist"
  command = "npm run build"

[build.environment]
  NODE_VERSION = "20"

# ── Proxy all /api/* to the Railway backend ──────────────────────────────────
[[redirects]]
  from   = "/api/*"
  to     = "https://evergreen-search-crm-production.up.railway.app/api/:splat"
  status = 200
  force  = true

# ── SPA fallback ─────────────────────────────────────────────────────────────
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
